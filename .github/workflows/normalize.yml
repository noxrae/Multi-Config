name: PRJN Normalization CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      report_zip:
        description: 'Path to playwright-report.zip'
        required: true
        default: 'playwright-report.zip'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests
        run: |
          pytest

  normalize:
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Normalize Report
        run: |
          python cli.py normalize --file ${{ github.event.inputs.report_zip }} --output normalized_report.json --summary-output summary.json
      - name: Upload Normalized Report
        uses: actions/upload-artifact@v4
        with:
          name: normalized-results
          path: |
            normalized_report.json
            summary.json
